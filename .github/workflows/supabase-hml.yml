# pipeline v4
name: Supabase HML Migrations

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 5.78.112.180 >> ~/.ssh/known_hosts

      - name: Sync migration files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            supabase/ \
            andre@5.78.112.180:/opt/migrations/hml/

      - name: Run Supabase migrations
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            andre@5.78.112.180 \
            "/opt/scripts/migrate-hml.sh /opt/migrations/hml"

      - name: Trigger Coolify deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            andre@5.78.112.180 \
            "curl -sf \
              -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
              'http://127.0.0.1:8000/api/v1/deploy?uuid=yz5kuauxei8egdw0qvvgdbob&force=false'"
