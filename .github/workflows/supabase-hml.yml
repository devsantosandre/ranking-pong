name: Supabase HML Migrations

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H 5.78.112.180 >> ~/.ssh/known_hosts

      - name: Sync migration files to VPS
        run: |
          rsync -az --delete \
            supabase/ \
            andre@5.78.112.180:/opt/migrations/hml/

      - name: Run Supabase migrations
        run: |
          ssh andre@5.78.112.180 \
            "/opt/scripts/migrate-hml.sh /opt/migrations/hml"

      - name: Trigger Coolify deployment
        run: |
          ssh andre@5.78.112.180 \
            "curl -sf \
              -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
              'http://127.0.0.1:8000/api/v1/deploy?uuid=yz5kuauxei8egdw0qvvgdbob&force=false'"
