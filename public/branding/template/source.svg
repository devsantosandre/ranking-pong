<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo arredondado (safe para maskable: conteudo dentro de 80% central) -->
  <rect width="512" height="512" rx="96" ry="96" fill="#2563eb"/>

  <!-- Podio: 3 barras verticais (ranking esportivo generico) -->
  <!-- Barra esquerda (3o lugar): mais baixa -->
  <rect x="120" y="296" width="76" height="120" rx="8" ry="8" fill="#ffffff" opacity="0.95"/>
  <!-- Barra central (1o lugar): mais alta -->
  <rect x="218" y="200" width="76" height="216" rx="8" ry="8" fill="#ffffff"/>
  <!-- Barra direita (2o lugar): media -->
  <rect x="316" y="248" width="76" height="168" rx="8" ry="8" fill="#ffffff" opacity="0.95"/>

  <!-- Coroa simbolica acima do 1o lugar (3 triangulos invertidos) -->
  <path d="M 218 188 L 240 152 L 256 176 L 272 152 L 294 188 Z" fill="#fbbf24"/>

  <!-- Base do podio -->
  <rect x="96" y="416" width="320" height="24" rx="6" ry="6" fill="#ffffff" opacity="0.8"/>
</svg>
